<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/styles/styleSheet-registrarse.css" />
    <link rel="stylesheet" href="../assets/styles/alianzas.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon" />
    <title>SkillSwap</title>
  </head>

  <body>
    <!-- Barra de Navegación -->
     <nav class="barra-navegacion">
       <!-- Botón menú hamburguesa -->
      <div class="menu-hamburguesa" id="btn-menu">
          <span></span>
          <span></span>
          <span></span>
      </div>
      <div class="logo">
        <a href="../index.html">
          <img src="../assets/images/SkillSwap_logo.png" alt="Logo de la aplicacion SkillSwap" />
        </a>
      </div>

      <div class="menu-horizontal">
        <ul class="menu-horizontal-opciones">
            <li class="dropdown">
                <a href="alianzas.html" class="dropbtn">Alianzas </a>
                <div class="dropdown-content">
                    <a href="#beneficios">Beneficios</a>
                    <a href="#universidades-afiliadas">Universidades Afiliadas</a>
                    <a href="#contacto-form">Contacto</a>
                </div>
            </li>
            <li><a href="proyectos.html">Proyectos</a></li>
            <li><a href="index-sobre-nosotros.html">Sobre nosotros</a></li>

          <li>
            <a href="index-login.html">
              <button class="btn-iniciarsesion">Iniciar Sesion</button>
            </a>
          </li>

          <li>
            <a href="index-registrarse.html">
              <button class="btn-registrase">Registrarse</button>
            </a>
          </li>
        </ul>
      </div>
      
    </nav>

    <!-- Sección de Registro -->
    <section id="registro-cuenta" class="pantalla activa">
      <div class="seccion-registro-cuenta">
        <h1>Registrarse</h1>

        <form class="formulario-registro" id="form">

          <div class="formulario-registro-elemento">
            <label>Nombres*</label>
            <input type="text" name="nombre" placeholder="Ariana Marcela" required/>
          </div>

          <div class="formulario-registro-elemento">
            <label>Apellidos*</label>
            <input type="text" name="apellido" placeholder="Garcia Vasquez" required/>
          </div>

          <div class="formulario-registro-elemento">
            <label for="email">Correo Institucional*</label>
            <input
              type="email"
              id="email"
              placeholder="Introduce tu email (debe terminar en .edu.pe)"
              required
            />
          </div>

          <div class="formulario-registro-elemento">
            <label>Contraseña*</label>
            <input type="text" name="contrasenia"
              placeholder="La contraseña debe tener un mínimo de 8 caracteres" required/>
          </div>
          <div class="formulario-registro-elemento">
            <input type="submit" value="Registrarse" />
          </div>
          <div class="formulario-registro-elemento">
            <label>¿Ya tienes cuenta?<a href="index-login.html"> Entra Aquí</a></label>
          </div>
        </form>
      </div>
    </section>

    <!-- Footer -->
     <footer>
      <div class="seccion-footer">
        <p>2025 SkillSwap. Todos los derechos reservados. <a href="../archivos/TerminosCondiciones.pdf" class="terminos-condiciones">Terminos y Condiciones</a> </p>
      </div>
    </footer>
    <script src="../assets/scripts/registro.js"></script>
  <script>
      // abrir/cerrar menú principal
      const btnMenu = document.getElementById('btn-menu');
      const menu = document.querySelector('.barra-navegacion .menu-horizontal');
      btnMenu.addEventListener('click', () => {
      menu.classList.toggle('activo');
  });

  // abrir/cerrar submenú ALIANZAS en móvil
      const btnAlianzas = document.getElementById("btn-alianzas");
      const submenuAlianzas = document.getElementById("submenu-alianzas");

      btnAlianzas.addEventListener("click", (event) => {
      event.preventDefault(); // evita navegar
      submenuAlianzas.classList.toggle("activo");
  });

  // 🔥 NUEVO: deja que los enlaces del submenú SI naveguen
        submenuAlianzas.querySelectorAll("a").forEach(enlace => {
        enlace.addEventListener("click", (event) => {
          event.stopPropagation(); // evita cerrar el dropdown al pulsar
      });
  });
</script>
  </body>
</html>
